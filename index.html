<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Nikoko</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#f5f5f5;
}

header {
  background:#ee4d2d;
  color:white;
  padding:30px;
  text-align:center;
}

/* JUDUL BESAR */
header h1 {
  font-family: 'Great Vibes', cursive;
  font-size:70px;
  margin:0;
}

/* SEARCH */
.search {
  padding:10px;
  width:90%;
  margin-top:15px;
  border:none;
  border-radius:5px;
}

.container {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  border-radius:10px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* NOMOR LINK */
.card h3 {
  margin:10px 0;
}

/* BUTTON */
.btn {
  display:block;
  background:#007bff;
  color:white;
  padding:8px;
  margin-top:10px;
  border-radius:5px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>Complete Your Life</h1>
  <input class="search" id="search" placeholder="Cari nomor link...">
</header>

<div class="container" id="produk"></div>

<script>
const data = [];

/* AUTO BUAT 100 LINK */
for(let i=1; i<=100; i++){
  data.push({
    nama: "Link " + i,
    link: "LINK_AFFILIASI_" + i
  });
}

function tampilkan(list){
  const el = document.getElementById("produk");
  el.innerHTML="";
  list.forEach(p=>{
    el.innerHTML += `
    <div class="card">
      <h3>${p.nama}</h3>
      <a class="btn" href="${p.link}" target="_blank">Klik Disini</a>
    </div>
    `;
  });
}

document.getElementById("search").addEventListener("keyup", function(){
  let k = this.value.toLowerCase();
  tampilkan(data.filter(p=>p.nama.toLowerCase().includes(k)));
});

tampilkan(data);
</script>

</body>
</html>
